<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- bleep boop i am computer -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>teletype: a lil terminal app</title>
    <style>
      * {
        box-sizing: border-box;
        font-family: monospace;
        background: #0d0e0e;
        color: #cfcfcf;
      }

      body {
        margin: 0;
        padding: 2rem;
      }

      a {
        color: white;
      }

      a[href="https://testflight.apple.com/join/AUmX1sFH"] {
        color: #cfcfcf;
      }

      a:hover {
        color: #2AF4DB;
      }

      main {
        width: min(100%, 440px);
        margin: 0 auto;
        gap: 2rem;
        display: flex;
        flex-direction: column;
      }

      li,
      dt,
      dd,
      figure {
        margin: 0;
        padding: 0;
      }

      dl,
      ul,
      p {
        padding: 0;
        margin: 1rem 0 0 0;
      }

      ul {
        list-style-type: "* ";
      }

      p,
      li,
      dd {
        line-height: 1.5;
      }

      h1 {
        letter-spacing: -0.05rem;
      }

      h1 span {
        color: white;
      }

      h1,
      h2,
      h3 {
        font-size: clamp(1.5rem, 6vw, 2rem);
        margin: 0;
      }

      h2 {
        font-size: 2rem;
      }

      img[src="/teletypeicon.png"] {
        width: min(100%, 120px);
        margin: 1rem auto;
        display: block;
        border-radius: 2rem;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/teletypeicon.png" alt="App icon">
      <section>
        <h1><span>teletype</span> is a lil terminal app for ios.</h1>
      </section>

      <h2>privacy policy: teletype collects no data about you.</h2>
    </main>
  </body>
</html>
